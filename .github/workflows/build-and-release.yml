name: build-and-release

# Builds a self-contained Windows x64 executable + an Inno Setup installer.
#  - Push to main / manual run  -> uploads downloadable build artifacts
#  - Push a tag like v0.2.0      -> also publishes a GitHub Release (zip + Setup.exe)
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Compute version
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -like 'refs/tags/*') {
            $v = "${{ github.ref_name }}".TrimStart('v')
          } else {
            $v = "0.0.0"
          }
          "VER=$v" >> $env:GITHUB_ENV
          Write-Host "version = $v"

      - name: Restore
        run: dotnet restore src/PasteNowWin/PasteNowWin.csproj

      - name: Publish (self-contained single file, win-x64)
        run: >
          dotnet publish src/PasteNowWin/PasteNowWin.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=none
          -o publish

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "/DMyAppVersion=${env:VER}" installer/PasteNowWin.iss

      - name: Package portable zip
        shell: pwsh
        run: |
          $zip = "PasteNowWin-${env:VER}-win-x64.zip"
          Compress-Archive -Path publish/* -DestinationPath $zip -Force
          "ZIP=$zip" >> $env:GITHUB_ENV

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PasteNowWin-win-x64
          path: |
            ${{ env.ZIP }}
            installer/output/PasteNowWin-${{ env.VER }}-Setup.exe
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "${env:ZIP}" `
            "installer/output/PasteNowWin-${env:VER}-Setup.exe" `
            --title "PasteNowWin ${{ github.ref_name }}" `
            --generate-notes
