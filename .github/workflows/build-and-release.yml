name: build-and-release

# Builds the Windows exe + installer AND the macOS .app, then:
#  - Push to main / manual run -> deploys the latest builds to the VPS (overwrites; keeps only latest)
#  - Push a tag like v0.9.0     -> also publishes a GitHub Release (versioned Windows + macOS downloads)
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Compute version
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -like 'refs/tags/*') {
            $v = "${{ github.ref_name }}".TrimStart('v')
          } else {
            $xml = [xml](Get-Content src/FineClipboard/FineClipboard.csproj)
            $v = ($xml.Project.PropertyGroup.Version | Where-Object { $_ } | Select-Object -First 1)
            if (-not $v) { $v = '0.0.0' }
          }
          "VER=$v" >> $env:GITHUB_ENV
          Write-Host "version = $v"

      - name: Restore
        run: dotnet restore src/FineClipboard/FineClipboard.csproj

      - name: Publish (self-contained single file, win-x64)
        run: >
          dotnet publish src/FineClipboard/FineClipboard.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=none
          -p:Version=${{ env.VER }}
          -o publish

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "/DMyAppVersion=${env:VER}" installer/FineClipboard.iss

      - name: Package portable zip
        shell: pwsh
        run: |
          $zip = "FineClipboard-${env:VER}-win-x64.zip"
          Compress-Archive -Path publish/* -DestinationPath $zip -Force

      - name: Stage Windows dist (fixed + versioned names + version + site)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist-win | Out-Null
          Copy-Item "installer/output/FineClipboard-${env:VER}-Setup.exe" "dist-win/FineClipboard-Setup.exe"
          Copy-Item "installer/output/FineClipboard-${env:VER}-Setup.exe" "dist-win/FineClipboard-${env:VER}-Setup.exe"
          Copy-Item "FineClipboard-${env:VER}-win-x64.zip" "dist-win/FineClipboard-win-x64.zip"
          Copy-Item "FineClipboard-${env:VER}-win-x64.zip" "dist-win/FineClipboard-${env:VER}-win-x64.zip"
          "${env:VER}" | Out-File -Encoding ascii -NoNewline dist-win/version.txt
          Copy-Item site/index.html dist-win/index.html

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-win
          path: dist-win
          if-no-files-found: error

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VER="${GITHUB_REF_NAME#v}"
          else
            VER=$(grep -oE '<Version>[^<]+' src/FineClipboard/FineClipboard.csproj | head -1 | sed 's/<Version>//')
            [ -z "$VER" ] && VER='0.0.0'
          fi
          echo "VER=$VER" >> "$GITHUB_ENV"
          echo "version = $VER"

      - name: Build universal .app + zip
        run: |
          cd mac
          UNIVERSAL=1 ./build-app.sh "$VER"

      - name: Stage macOS dist (fixed + versioned names)
        run: |
          mkdir -p dist-mac
          cp "mac/dist/FineClipboard-${VER}-mac.zip" "dist-mac/FineClipboard-mac.zip"
          cp "mac/dist/FineClipboard-${VER}-mac.zip" "dist-mac/FineClipboard-${VER}-mac.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-mac
          path: dist-mac
          if-no-files-found: error

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-win
          path: dist-win
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-mac
          path: dist-mac
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER="${GITHUB_REF_NAME#v}"
          # Attach BOTH versioned assets (stable per-version links) and fixed-name assets.
          # The fixed names power GitHub's permanent "latest" URLs, e.g.
          #   https://github.com/<repo>/releases/latest/download/FineClipboard-Setup.exe
          # which always resolve to the newest release — the website links to these.
          gh release create "${GITHUB_REF_NAME}" \
            "dist-win/FineClipboard-${VER}-Setup.exe" \
            "dist-win/FineClipboard-${VER}-win-x64.zip" \
            "dist-mac/FineClipboard-${VER}-mac.zip" \
            "dist-win/FineClipboard-Setup.exe" \
            "dist-win/FineClipboard-win-x64.zip" \
            "dist-mac/FineClipboard-mac.zip" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "FineClipboard ${GITHUB_REF_NAME}" \
            --generate-notes

  deploy:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-win
          path: dist-win
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-mac
          path: dist-mac

      - name: Deploy to VPS (overwrite latest only)
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_DIR: ${{ secrets.VPS_DEPLOY_DIR }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          OPTS="-i $HOME/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o BatchMode=yes -o ConnectTimeout=20"
          ssh $OPTS "$VPS_USER@$VPS_HOST" "mkdir -p '$VPS_DIR/download'"
          scp $OPTS dist-win/FineClipboard-Setup.exe   "$VPS_USER@$VPS_HOST:$VPS_DIR/download/FineClipboard-Setup.exe"
          scp $OPTS dist-win/FineClipboard-win-x64.zip "$VPS_USER@$VPS_HOST:$VPS_DIR/download/FineClipboard-win-x64.zip"
          scp $OPTS dist-mac/FineClipboard-mac.zip     "$VPS_USER@$VPS_HOST:$VPS_DIR/download/FineClipboard-mac.zip"
          scp $OPTS dist-win/version.txt               "$VPS_USER@$VPS_HOST:$VPS_DIR/download/version.txt"
          scp $OPTS dist-win/index.html                "$VPS_USER@$VPS_HOST:$VPS_DIR/index.html"
          rm -f ~/.ssh/deploy_key
          echo "Deployed version $(cat dist-win/version.txt) to $VPS_HOST"
