name: build-and-release

# Builds a self-contained Windows x64 exe + an Inno Setup installer, then:
#  - Push to main / manual run -> deploys the latest build to the VPS (overwrites; keeps only latest)
#  - Push a tag like v0.4.0     -> also publishes a GitHub Release (versioned zip + Setup.exe)
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Compute version
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -like 'refs/tags/*') {
            $v = "${{ github.ref_name }}".TrimStart('v')
          } else {
            $xml = [xml](Get-Content src/PasteNowWin/PasteNowWin.csproj)
            $v = ($xml.Project.PropertyGroup.Version | Where-Object { $_ } | Select-Object -First 1)
            if (-not $v) { $v = '0.0.0' }
          }
          "VER=$v" >> $env:GITHUB_ENV
          Write-Host "version = $v"

      - name: Restore
        run: dotnet restore src/PasteNowWin/PasteNowWin.csproj

      - name: Publish (self-contained single file, win-x64)
        run: >
          dotnet publish src/PasteNowWin/PasteNowWin.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=none
          -o publish

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "/DMyAppVersion=${env:VER}" installer/PasteNowWin.iss

      - name: Package portable zip
        shell: pwsh
        run: |
          $zip = "PasteNowWin-${env:VER}-win-x64.zip"
          Compress-Archive -Path publish/* -DestinationPath $zip -Force
          "ZIP=$zip" >> $env:GITHUB_ENV

      - name: Stage VPS dist (fixed names + version + site)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item "installer/output/PasteNowWin-${env:VER}-Setup.exe" "dist/PasteNowWin-Setup.exe"
          Copy-Item "${env:ZIP}" "dist/PasteNowWin-win-x64.zip"
          "${env:VER}" | Out-File -Encoding ascii -NoNewline dist/version.txt
          Copy-Item site/index.html dist/index.html

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: vps-dist
          path: dist
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "${env:ZIP}" `
            "installer/output/PasteNowWin-${env:VER}-Setup.exe" `
            --title "PasteNowWin ${{ github.ref_name }}" `
            --generate-notes

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: vps-dist
          path: dist

      - name: Deploy to VPS (overwrite latest only)
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_DIR: ${{ secrets.VPS_DEPLOY_DIR }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          OPTS="-i $HOME/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o BatchMode=yes -o ConnectTimeout=20"
          ssh $OPTS "$VPS_USER@$VPS_HOST" "mkdir -p '$VPS_DIR/download'"
          scp $OPTS dist/PasteNowWin-Setup.exe   "$VPS_USER@$VPS_HOST:$VPS_DIR/download/PasteNowWin-Setup.exe"
          scp $OPTS dist/PasteNowWin-win-x64.zip "$VPS_USER@$VPS_HOST:$VPS_DIR/download/PasteNowWin-win-x64.zip"
          scp $OPTS dist/version.txt             "$VPS_USER@$VPS_HOST:$VPS_DIR/download/version.txt"
          scp $OPTS dist/index.html              "$VPS_USER@$VPS_HOST:$VPS_DIR/index.html"
          rm -f ~/.ssh/deploy_key
          echo "Deployed version $(cat dist/version.txt) to $VPS_HOST"
